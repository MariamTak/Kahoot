image: cypress/browsers:22.15.0

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

stages:
  - build
  - test

build:
  stage: build
  script:
    - npm ci
    - npx ng build --configuration production
  artifacts:
    paths:
      - www/
    expire_in: 1 hour

cypress:
  stage: test
  script:
    - npm ci
    - npx ng serve --port 8100 --host 0.0.0.0 &
    - npx wait-on http://localhost:8100 --timeout 120000
    - npx cypress run --browser chrome
  artifacts:
    when: always
    paths:
      - cypress/videos/**/*.mp4
      - cypress/screenshots/**/*.png
    expire_in: 1 day