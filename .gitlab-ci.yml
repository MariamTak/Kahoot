stages:
  - install
  - lint
  - test
  - build

variables:
  NODE_VERSION: "18"

cache:
  paths:
    - node_modules/

install:
  stage: install
  image: node:18
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: lint
  image: node:18
  script:
    - npm run lint
  needs: [install]

test:
  stage: test
  image: node:18
  script:
    - npm run test -- --configuration=ci
  needs: [install]

build:
  stage: build
  image: node:18
  script:
    - npm run build -- --configuration=production
  artifacts:
    paths:
      - www/
    expire_in: 1 week
  needs: [install]
  only:
    - main
    - develop